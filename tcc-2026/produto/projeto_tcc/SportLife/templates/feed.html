{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between">

<h2>Feed Social</h2>

<a href="/criar-post"
class="btn btn-sport">

Novo Post

</a>

</div>

{% for post in posts %}

<div class="feed-card">

    <h3>{{ post.titulo }}</h3>

    <p>{{ post.descricao }}</p>

    {% if current_user.is_authenticated %}

    <a href="/excluir-post/{{ post.id }}"
       class="btn btn-danger">

        Excluir

    </a>

    {% endif %}

</div>

{% endfor %}

{% endblock %}
