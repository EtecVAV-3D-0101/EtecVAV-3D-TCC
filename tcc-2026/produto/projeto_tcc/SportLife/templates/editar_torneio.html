{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Editar Torneio

</h2>

<div class="form-card">

<form method="POST">

    <label>

        Nome

    </label>

    <input
        type="text"
        name="nome"
        value="{{ torneio.nome }}"
        class="form-control mb-3">

    <label>

        Modalidade

    </label>

    <input
        type="text"
        name="modalidade"
        value="{{ torneio.modalidade }}"
        class="form-control mb-3">

    <label>

        Descrição

    </label>

    <textarea
        name="descricao"
        rows="5"
        class="form-control mb-4">{{ torneio.descricao }}</textarea>

    <button
        class="btn btn-sport">

        Atualizar Torneio

    </button>

</form>

</div>

{% endblock %}
