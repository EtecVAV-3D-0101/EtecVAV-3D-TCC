{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="form-card">

            <h2 class="text-center mb-4">

                Criar Conta

            </h2>

            <form method="POST">

                <input
                    type="text"
                    name="nome"
                    class="form-control mb-3"
                    placeholder="Nome Completo"
                    required>

                <input
                    type="email"
                    name="email"
                    class="form-control mb-3"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    name="senha"
                    class="form-control mb-3"
                    placeholder="Senha"
                    required>

                <button
                    class="btn btn-sport w-100">

                    Cadastrar

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
